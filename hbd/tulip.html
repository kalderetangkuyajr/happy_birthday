<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tulip Night Garden</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:flex-end;
background:linear-gradient(#020024,#090979,#000000);
overflow:hidden;
font-family:sans-serif;
}

/* stars */
/* container for stars */
.star {
  position: absolute;
  background: white;
  border-radius: 50%;
  opacity: 0;
  animation: twinkleStar linear infinite;
}

/* twinkle animation for each star */
@keyframes twinkleStar {
  0%, 100% { opacity: 0; }
  50% { opacity: 1; }
}

/* ground */
.ground{
position:absolute;
bottom:0;
width:100%;
height:clamp(80px,12vh,140px);
background:#041f0f;
 z-index:2; 
}

/* garden */
.garden{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:clamp(30px,6vw,80px);
  margin-bottom:clamp(40px,10vh,100px);
  padding:10px;
   z-index:2
}

/* tulip */
.tulip{
position:relative;
width:clamp(50px,8vw,90px);
height:clamp(120px,18vh,170px);
display:flex;
justify-content:center;
animation:sway 4s ease-in-out infinite;
transform-origin:bottom center;
 z-index:2
}

/* stem */
.stem{
position:absolute;
bottom:0;
width:clamp(4px,.7vw,7px);
height:70%;
background:#2e8b57;
 z-index:2;
}

/* leaves */
.leaf{
position:absolute;
width:clamp(25px,4vw,45px);
height:clamp(12px,2vw,22px);
background:#3cb371;
border-radius:40px 0 40px 0;
top:35%;
 z-index:2; 
}

.leaf.left{
left:-40%;
transform:rotate(-40deg);
}

.leaf.right{
right:-40%;
transform:rotate(40deg);
}

/* petals */
.petal{
position:absolute;
width: clamp(28px, 10vw, 36px); 
height: clamp(45px, 15vh, 60px); 
border-radius:40px 40px 30px 30px;
top:-5%;
left:50%;
transform-origin:bottom center;
}

/* colors */
.red{
background:#f34262;
color:#f34262;
}

.pink{
background:#ff8fab;
color:#ff8fab;
}

.purple{
background:#c77dff;
color:#c77dff;
}

.blue{
background:#4572e6;
color:#4572e6;
}

/* petal positions */
.leftPetal{
transform:translateX(-90%) rotate(0deg);
animation:bloomLeft 3s forwards, glow 2s infinite alternate;
z-index: 4;
}

.middlePetal{
transform:translateX(-50%) scaleY(.2);
animation:bloomMiddle 3s forwards, glow 2s infinite alternate;
z-index: 3;
}

/* stronger shading for middle petal */
.middlePetal.red {
  background: radial-gradient(circle at 50% 50%, #f34262 60%, #a91f3d 100%);
  box-shadow: inset -5px 0 10px rgba(0,0,0,0.2), 
              inset 5px 0 10px rgba(0,0,0,0.2);
}

.middlePetal.pink {
  background: radial-gradient(circle at 50% 50%, #ff8fab 60%, #d45571 100%);
  box-shadow: inset -5px 0 10px rgba(0,0,0,0.2), 
              inset 5px 0 10px rgba(0,0,0,0.2);
}

.middlePetal.purple {
  background: radial-gradient(circle at 50% 50%, #c77dff 60%, #8131ff 100%);
  box-shadow: inset -5px 0 10px rgba(0,0,0,0.25), 
              inset 5px 0 10px rgba(0,0,0,0.25);
}

.middlePetal.blue {
  background: radial-gradient(circle at 50% 50%, #4572e6 60%, #1f3aad 100%);
  box-shadow: inset -5px 0 10px rgba(0,0,0,0.25), 
              inset 5px 0 10px rgba(0,0,0,0.25);
}
.rightPetal{
transform:translateX(-10%) rotate(0deg);
animation:bloomRight 3s forwards, glow 2s infinite alternate;
z-index: 4;
}
/* wind animation */
@keyframes sway{
0%{transform:rotate(-2deg);}
50%{transform:rotate(2deg);}
100%{transform:rotate(-2deg);}
}

@keyframes bloomLeft{
0%{transform:translateX(-90%) rotate(0deg);}
100%{transform:translateX(-90%) rotate(-25deg);}
}

@keyframes bloomRight{
0%{transform:translateX(-10%) rotate(0deg);}
100%{transform:translateX(-10%) rotate(25deg);}
}

@keyframes bloomMiddle{
0%{transform:translateX(-50%) scaleY(.2);}
100%{transform:translateX(-50%) scaleY(1);}
}

/* glow animations per color */

@keyframes glow{
0%{filter:drop-shadow(0 0 5px currentColor);}
100%{filter:drop-shadow(0 0 25px currentColor);}
}

/* mobile adjustment */
@media (max-width:600px){

.petal{
position:absolute;
width: clamp(28px, 10vw, 36px);   /* slightly wider on small screens */
height: clamp(45px, 15vh, 60px);  /* slightly shorter but proportional */
border-radius:40px 40px 30px 30px;
top:-5%;
left:50%;
transform-origin:bottom center;
}

}

.shooting-star{
position:absolute;
top:0;
width:3px;
height:120px;
background:linear-gradient(transparent, white);
transform:rotate(45deg);
opacity:0;
pointer-events:none;
filter:drop-shadow(0 0 6px white) drop-shadow(0 0 12px white);
animation:shoot 1.2s linear forwards;
z-index:1;
}

@keyframes shoot{
0%{
opacity:1;
transform:translate(0,0) rotate(45deg);
}

100%{
opacity:0;
transform:translate(-600px,600px) rotate(45deg);
}
}

.shooting-star:nth-child(1){left:20%; animation-delay:0s;}
.shooting-star:nth-child(2){left:60%; animation-delay:3s;}
.shooting-star:nth-child(3){left:80%; animation-delay:5s;}



.firefly {
  position: absolute;
  width: 6px;
  height: 6px;
  background: radial-gradient(circle, #fff 0%, #f2ff00 50%, transparent 70%);
  border-radius: 50%;
  opacity: 0;
  pointer-events: none;
  filter: drop-shadow(0 0 6px #fff) drop-shadow(0 0 10px #f2ff00);
  animation: float 4s ease-in-out infinite;
  z-index: 1; /* behind garden */
}

@keyframes float {
  0% { transform: translate(0, 0) scale(0.5); opacity:0; }
  25% { opacity:1; }
  50% { transform: translate(var(--x), var(--y)) scale(1); opacity:1; }
  75% { opacity:1; }
  100% { transform: translate(calc(var(--x)*-1), calc(var(--y)*-1)) scale(0.5); opacity:0; }
}

.ground{ 
  position:absolute; 
  bottom:0; 
  width:100%; 
  height:clamp(80px,12vh,140px); 
  background:#041f0f; 
}


</style>
</head>

<body>
<div class="shooting-star"></div>
<div class="shooting-star"></div>
<div class="shooting-star"></div>

<div class="firefly"></div>
<div class="firefly"></div>
<div class="firefly"></div>
<div class="firefly"></div>

<div class="garden">

<div class="tulip">
<div class="petal leftPetal red"></div>
<div class="petal middlePetal red"></div>
<div class="petal rightPetal red"></div>
<div class="stem">
<div class="leaf left"></div>
<div class="leaf right"></div>
</div>
</div>

<div class="tulip">
<div class="petal leftPetal pink"></div>
<div class="petal middlePetal pink"></div>
<div class="petal rightPetal pink"></div>
<div class="stem">
<div class="leaf left"></div>
<div class="leaf right"></div>
</div>
</div>

<div class="tulip">
<div class="petal leftPetal purple"></div>
<div class="petal middlePetal purple"></div>
<div class="petal rightPetal purple"></div>
<div class="stem">
<div class="leaf left"></div>
<div class="leaf right"></div>
</div>
</div>

<div class="tulip">
<div class="petal leftPetal blue"></div>
<div class="petal middlePetal blue"></div>
<div class="petal rightPetal blue"></div>
<div class="stem">
<div class="leaf left"></div>
<div class="leaf right"></div>
</div>
</div>

</div>

<div class="ground"></div> 

<script>

function createShootingStar(){

const star = document.createElement("div");
star.className = "shooting-star";

/* random horizontal position */
star.style.left = Math.random() * window.innerWidth + "px";

/* random vertical position (top sky area) */
star.style.top = Math.random() * (window.innerHeight * 0.4) + "px";

document.body.appendChild(star);

/* remove after animation */
setTimeout(()=>{
star.remove();
},1200);

}

/* create stars randomly every few seconds */

setInterval(()=>{
createShootingStar();
},2000 + Math.random()*4000);

function createFirefly() {
  const firefly = document.createElement('div');
  firefly.className = 'firefly';

  // Random starting position
  firefly.style.left = Math.random() * window.innerWidth + 'px';
  firefly.style.top = Math.random() * (window.innerHeight * 0.6) + 'px';

  // Random movement distance
  const dx = (Math.random() - 0.5) * 100; // horizontal move
  const dy = (Math.random() - 0.5) * 100; // vertical move
  firefly.style.setProperty('--x', dx + 'px');
  firefly.style.setProperty('--y', dy + 'px');

  // Random animation duration
  const duration = 3 + Math.random() * 3; // 3–6s
  firefly.style.animationDuration = duration + 's';

  document.body.appendChild(firefly);

  // Remove firefly after 6 seconds to prevent too many elements
  setTimeout(() => firefly.remove(), duration * 1000);
}

// Spawn multiple fireflies randomly
setInterval(() => {
  const count = 1 + Math.floor(Math.random() * 3); // 1–3 fireflies per interval
  for (let i = 0; i < count; i++) createFirefly();
}, 1000); // every second

const starCount = 100; // number of stars
const body = document.body;

for (let i = 0; i < starCount; i++) {
  const star = document.createElement('div');
  star.classList.add('star');

  // random position
  star.style.left = Math.random() * 100 + 'vw';
  star.style.top = Math.random() * 100 + 'vh';

  // random size
  const size = Math.random() * 2 + 1; // 1px to 3px
  star.style.width = size + 'px';
  star.style.height = size + 'px';

  // random twinkle duration & delay
  const duration = Math.random() * 3 + 1; // 1s to 4s
  const delay = Math.random() * 5; // 0s to 5s
  star.style.animationDuration = `${duration}s`;
  star.style.animationDelay = `${delay}s`;

  body.appendChild(star);
}

</script>

</body>
</html>
