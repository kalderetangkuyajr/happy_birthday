<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Papansin</title>

<body class="login-mode">

<div class="container" id="loginPage">
  <div class="password-box">
    <input type="tel" inputmode="numeric" maxlength="1">
    <input type="tel" inputmode="numeric" maxlength="1">
    <input type="tel" inputmode="numeric" maxlength="1">
    <input type="tel" inputmode="numeric" maxlength="1">
  </div>

  <div class="hint">
    <span class="hint-label">hint:</span>
    <span class="hint-text"> promised year.</span>
  </div>
</div>

<div class="moon hidden" onclick="toggleLetter()"></div>

<div class="letter" id="letter">
  <p id="typedText"></p>
  <button class="close-btn" onclick="toggleLetter()">X</button>
</div>

<div id="polaroidOverlay">
  <img id="polaroidImg" src="" alt="Polaroid Photo">
</div>

<div class="container hidden" id="birthdayPage">
  <div class="title">Happy Birthday!!!</div>
  <!--<div class="subtitle">My dearest</div>-->
</div>

<div id="tulipBG" class="hidden">

  <div class="shooting-star"></div>
  <div class="shooting-star"></div>
  <div class="shooting-star"></div>

  <div class="firefly"></div>
  <div class="firefly"></div>

  <div class="garden">

   
    <div class="tulip">
  <div class="tulip-inner">
    <div class="petal leftPetal red"></div>
    <div class="petal middlePetal red"></div>
    <div class="petal rightPetal red"></div>
    <div class="stem">
      <div class="leaf left"></div>
      <div class="leaf right"></div>
    </div>
  </div>
</div>

<div class="tulip">
  <div class="tulip-inner">
    <div class="petal leftPetal pink"></div>
    <div class="petal middlePetal pink"></div>
    <div class="petal rightPetal pink"></div>
    <div class="stem">
      <div class="leaf left"></div>
      <div class="leaf right"></div>
    </div>
  </div>
</div>

<div class="tulip">
  <div class="tulip-inner">
    <div class="petal leftPetal purple"></div>
    <div class="petal middlePetal purple"></div>
    <div class="petal rightPetal purple"></div>

      <div class="leaf left"></div>
      <div class="leaf right"></div>
    </div>
  </div>
</div>

<div class="tulip">

    <div class="petal leftPetal blue"></div>
    <div class="petal middlePetal blue"></div>
    <div class="petal rightPetal blue"></div>
    <div class="stem">
      <div class="leaf left"></div>
      <div class="leaf right"></div>
    </div>
  </div>
</div>


  </div>

  <div class="ground"></div>
</div>


<audio id="birthdayMusic" src="hbd.m4a" loop></audio>
